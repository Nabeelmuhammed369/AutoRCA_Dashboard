version: '3.9'

services:

  # ── AutoRCA API Server ─────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    container_name: autorca-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - AUTORCA_API_KEY=${AUTORCA_API_KEY}
      - ALLOWED_ORIGIN=${ALLOWED_ORIGIN:-http://localhost:3000}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    env_file:
      - .env
    volumes:
      - ./logs:/app/logs
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health",
             "-H", "X-API-Key: ${AUTORCA_API_KEY}"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - autorca-net

  # ── Nginx reverse proxy (production-like) ─────────────────
  nginx:
    image: nginx:alpine
    container_name: autorca-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./autorca_dashboard.html:/usr/share/nginx/html/index.html:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      - autorca-net
    profiles:
      - production

  # ── Prometheus metrics ─────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: autorca-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.retention.time=15d'
    networks:
      - autorca-net
    profiles:
      - monitoring

  # ── Grafana dashboards ─────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: autorca-grafana
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - autorca-net
    profiles:
      - monitoring

networks:
  autorca-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data: