name: AutoRCA CI/CD Pipeline

on:
  push:
    branches: [ main, develop, "feature/**", "hotfix/**" ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Nightly regression run at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [ staging, production ]
      skip_tests:
        description: 'Skip test suite (emergency deploys only)'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Cancel in-progress runs on the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ═══════════════════════════════════════════
  # JOB 1 — Lint & Static Analysis
  # ═══════════════════════════════════════════
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install ruff mypy bandit safety --quiet

      - name: Ruff — auto-fix safe issues
        # Silently fixes E741, W293, E402, import order, etc.
        run: ruff check . --fix --exit-zero

      - name: Ruff — fail on unfixable errors
        # Fails CI if anything ruff couldn't auto-fix remains (F821, B904, etc.)
        run: ruff check . --output-format=github

      - name: Ruff — format check
        run: ruff format --check .

      - name: Commit auto-fixes back to branch
        # If ruff --fix changed any files, commit them so the branch stays clean.
        # [skip ci] prevents an infinite loop of CI triggering itself.
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix ruff issues [skip ci]"
          file_pattern: "**/*.py"
        if: github.event_name == 'push' && github.actor != 'dependabot[bot]'

      - name: MyPy type checking
        run: mypy api_server.py ai_analyzer.py --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # warnings only for now

      - name: Bandit security scan (Python AST)
        run: bandit -r . -x ./tests -ll -f json -o bandit-report.json
        continue-on-error: true

      - name: Safety — dependency vulnerability check
        run: safety check --json > safety-report.json
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

  # ═══════════════════════════════════════════
  # JOB 2 — Python Backend Tests
  #   Covers: RCA endpoints (original) +
  #           Supabase integration (new)
  # ═══════════════════════════════════════════
  python-tests:
    name: "Python — pytest (py${{ matrix.python-version }})"
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ !inputs.skip_tests }}
    permissions:
      contents: read
      checks: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install \
            "plotly>=5.18.0" \
            "pandas>=2.0.0" \
            "fastapi>=0.111.0" \
            "uvicorn[standard]>=0.29.0" \
            "python-dotenv>=1.0.0" \
            "requests>=2.31.0" \
            "pyyaml>=6.0" \
            "slowapi>=0.1.9" \
            "groq>=0.9.0" \
            "supabase>=2.0.0" \
            "httpx>=0.27.0" \
            "pytest>=8.0.0" \
            "pytest-asyncio>=0.23.0" \
            "pytest-cov>=5.0.0" \
            "pytest-timeout>=0.6.0"

      - name: Create stub modules for local imports
        # api_server imports internal modules (Monitors.*, Core.*) that don't
        # exist in CI — stub them so only endpoint logic is tested.
        run: |
          python - <<'EOF'
          import os, pathlib

          stubs = {
            "Monitors/__init__.py": "",
            "Monitors/api_monitor.py": "def check_api_health(*a,**k): return {'status':'ok'}",
            "Monitors/log_analyzer.py": "def analyze_logs(*a,**k): return {'total':0,'errors':0,'warnings':0,'valid':True}",
            "Monitors/db_validator.py": "def validate_data(*a,**k): return {'valid':True,'row_count':0}",
            "Core/__init__.py": "",
            "Core/rca_engine.py": "def classify_issue(*a,**k): return 'healthy'",
            "Core/logger.py": "import logging\ndef setup_logger(): pass",
            "Core/ai_analyzer.py": (
              "def explain_incident(*a,**k): return {'text':''}\n"
              "def suggest_fixes(*a,**k): return {'steps':[]}\n"
              "def generate_ticket_summary(*a,**k): return {'summary':''}"
            ),
            "config.yaml": (
              "api:\n  url: http://localhost\n  timeout: 5\n"
              "log:\n  file: /tmp/test.log\n"
              "database:\n  path: /tmp/test.db\n"
            ),
          }

          for path, content in stubs.items():
            p = pathlib.Path(path)
            p.parent.mkdir(parents=True, exist_ok=True)
            p.write_text(content)
          print("Stubs created.")
          EOF

      - name: Create test environment file
        run: |
          cat > .env << EOF
          AUTORCA_API_KEY=test-key-ci-${{ github.run_id }}
          ALLOWED_ORIGIN=http://localhost:3000
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY_TEST }}
          SUPABASE_URL=https://test.supabase.co
          SUPABASE_KEY=test-supabase-key
          LOG_LEVEL=WARNING
          EOF

      - name: Run full test suite with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=15 \
            --timeout=30 \
            --tb=short \
            -v \
            --junitxml=test-results.xml
        env:
          AUTORCA_API_KEY: "test-api-key"
          SUPABASE_URL:    "https://test.supabase.co"
          SUPABASE_KEY:    "test-key"

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            test-results.xml
            htmlcov/
            coverage.xml
          retention-days: 14

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && matrix.python-version == '3.11'
        with:
          files: test-results.xml
          check_name: "Python Test Results"

  # ═══════════════════════════════════════════
  # JOB 3 — JavaScript Frontend Tests (Vitest)
  #   Tests RCA duplicate-check logic and any
  #   new frontend features (new)
  # ═══════════════════════════════════════════
  js-tests:
    name: "JS — Vitest (frontend logic)"
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Bootstrap package.json if absent
        # Allows the repo to opt in to JS tests without a pre-existing package.json
        run: |
          if [ ! -f package.json ]; then
            npm init -y
          fi

      - name: Install Vitest
        run: npm install --save-dev vitest@latest

      - name: Add test script to package.json
        run: |
          node -e "
            const fs = require('fs');
            const pkg = JSON.parse(fs.readFileSync('package.json'));
            pkg.scripts = pkg.scripts || {};
            pkg.scripts.test = 'vitest run';
            fs.writeFileSync('package.json', JSON.stringify(pkg, null, 2));
          "

      - name: Run Vitest
        run: npx vitest run tests/test_rca_logic.js --reporter=verbose

      - name: Generate Vitest coverage (non-blocking)
        run: |
          npm install --save-dev @vitest/coverage-v8
          npx vitest run tests/test_rca_logic.js \
            --coverage \
            --coverage.provider=v8 \
            --coverage.reporter=json \
            --coverage.reportsDirectory=./coverage-js \
            || true
        continue-on-error: true

      - name: Upload JS coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: js-coverage
          path: coverage-js/
          retention-days: 14

  # ═══════════════════════════════════════════
  # JOB 4 — API Contract & Integration Tests
  # ═══════════════════════════════════════════
  api-test:
    name: API Contract Tests
    runs-on: ubuntu-latest
    needs: [python-tests, js-tests]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt httpx pytest pytest-timeout --quiet

      - name: Start API server
        run: |
          cat > .env << EOF
          AUTORCA_API_KEY=ci-contract-test-key
          ALLOWED_ORIGIN=http://localhost:3000
          SUPABASE_URL=https://test.supabase.co
          SUPABASE_KEY=test-supabase-key
          EOF
          python api_server.py &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in {1..15}; do
            curl -sf http://localhost:8000/api/health \
              -H "X-API-Key: ci-contract-test-key" && break || sleep 1
          done

      - name: Run API contract tests
        run: |
          pytest tests/test_api_contracts.py \
            --timeout=15 \
            -v \
            --tb=short

      - name: Test rate limiting behaviour
        run: |
          python - << 'PYEOF'
          import httpx, sys
          key = "ci-contract-test-key"
          url = "http://localhost:8000/api/health"
          # Send 15 rapid requests — rate limiter should kick in by ~10
          statuses = []
          with httpx.Client() as c:
              for _ in range(15):
                  r = c.get(url, headers={"X-API-Key": key})
                  statuses.append(r.status_code)
          print("Statuses:", statuses)
          if 429 not in statuses:
              print("WARNING: Rate limiter may not be active")
          else:
              print("✓ Rate limiting working correctly")
          PYEOF

      - name: Stop API server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

  # ═══════════════════════════════════════════
  # JOB 5 — Gate: all tests must pass
  # ═══════════════════════════════════════════
  all-tests-pass:
    name: "All tests passed"
    runs-on: ubuntu-latest
    needs: [python-tests, js-tests, api-test]
    if: always()

    steps:
      - name: Check results
        run: |
          if [ "${{ needs.python-tests.result }}" != "success" ]; then
            echo "❌ Python tests failed"
            exit 1
          fi
          if [ "${{ needs.js-tests.result }}" != "success" ]; then
            echo "❌ JS tests failed"
            exit 1
          fi
          if [ "${{ needs.api-test.result }}" != "success" ]; then
            echo "❌ API contract tests failed"
            exit 1
          fi
          echo "✅ All tests passed"

  # ═══════════════════════════════════════════
  # JOB 6 — Build & Package
  # ═══════════════════════════════════════════
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: all-tests-pass
    outputs:
      version: ${{ steps.version.outputs.version }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version calculation

      - name: Calculate version
        id: version
        run: |
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMITS=$(git rev-list ${LATEST_TAG}..HEAD --count 2>/dev/null || echo "0")
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${LATEST_TAG}.${COMMITS}+${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "AutoRCA version: ${VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Python package
        run: |
          pip install build --quiet
          python -m build
        continue-on-error: true

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

      - name: Run Trivy container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ═══════════════════════════════════════════
  # JOB 7 — Deploy to Staging
  # ═══════════════════════════════════════════
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    environment:
      name: staging
      url: https://autorca-staging.yourdomain.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render (staging)
        run: |
          curl -s -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
          | jq .

      - name: Wait for staging deployment
        run: |
          echo "Waiting for staging to come up..."
          for i in {1..24}; do
            STATUS=$(curl -sf https://autorca-staging.yourdomain.com/api/health \
              -H "X-API-Key: ${{ secrets.STAGING_API_KEY }}" \
              | jq -r '.status' 2>/dev/null || echo "down")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "ok" ]; then
              echo "✓ Staging is live"
              exit 0
            fi
            sleep 10
          done
          echo "✗ Staging failed to come up in time"
          exit 1

      - name: Run smoke tests against staging
        run: |
          pip install httpx --quiet
          python - << 'PYEOF'
          import httpx, sys
          base = "https://autorca-staging.yourdomain.com"
          key  = "${{ secrets.STAGING_API_KEY }}"

          checks = [
              ("GET",  "/api/health",  None),
              ("POST", "/api/analyze", {"log_content": "2024-01-01 ERROR test fail\n"}),
          ]

          failed = 0
          with httpx.Client(headers={"X-API-Key": key}, timeout=15) as c:
              for method, path, body in checks:
                  r = c.request(method, base+path, json=body)
                  ok = r.status_code < 400
                  print(f"{'✓' if ok else '✗'} {method} {path} → {r.status_code}")
                  if not ok: failed += 1

          sys.exit(failed)
          PYEOF

      - name: Notify Slack — staging deployed
        uses: slackapi/slack-github-action@v1.26.0
        if: always()
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *AutoRCA Staging* — `${{ needs.build.outputs.version }}` deployed\n${{ github.event.head_commit.message }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ═══════════════════════════════════════════
  # JOB 8 — Deploy to Production
  # ═══════════════════════════════════════════
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://autorca.yourdomain.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          curl -s -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
          | jq .

      - name: Health check — production
        run: |
          for i in {1..30}; do
            STATUS=$(curl -sf https://autorca.yourdomain.com/api/health \
              -H "X-API-Key: ${{ secrets.PROD_API_KEY }}" \
              | jq -r '.status' 2>/dev/null || echo "down")
            if [ "$STATUS" = "ok" ]; then
              echo "✓ Production is live"
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: "AutoRCA ${{ needs.build.outputs.version }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: false

      - name: Notify Slack — production deployed
        uses: slackapi/slack-github-action@v1.26.0
        if: always()
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '🚀' || '🔥' }} *AutoRCA Production* — `${{ needs.build.outputs.version }}` ${{ job.status }}\nCommit: ${{ github.event.head_commit.message }}\nAuthor: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK