name: AutoRCA CI/CD Pipeline

on:
  push:
    branches: [ main, develop, "feature/**", "hotfix/**" ]
  pull_request:
    branches: [ main, develop ]
  schedule:
    # Nightly regression run at 02:00 UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target environment'
        required: true
        default: 'staging'
        type: choice
        options: [ staging, production ]
      skip_tests:
        description: 'Skip test suite (emergency deploys only)'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  NODE_VERSION: '20'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

# Cancel in-progress runs on the same branch (saves CI minutes)
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ═══════════════════════════════════════════
  # JOB 1 — Lint & Static Analysis
  # ═══════════════════════════════════════════
  lint:
    name: Lint & Static Analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install linting tools
        run: |
          pip install ruff mypy bandit safety --quiet

      - name: Ruff (fast linter + formatter check)
        run: ruff check . --output-format=github

      - name: Ruff format check
        run: ruff format --check .

      - name: MyPy type checking
        run: mypy api_server.py ai_analyzer.py --ignore-missing-imports --no-strict-optional
        continue-on-error: true  # warnings only for now

      - name: Bandit security scan (Python AST)
        run: bandit -r . -x ./tests -ll -f json -o bandit-report.json
        continue-on-error: true

      - name: Safety — dependency vulnerability check
        run: safety check --json > safety-report.json
        continue-on-error: true

      - name: Upload security reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: security-reports
          path: |
            bandit-report.json
            safety-report.json
          retention-days: 30

  # ═══════════════════════════════════════════
  # JOB 2 — Unit + Integration Tests
  # ═══════════════════════════════════════════
  test:
    name: Test Suite (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint
    if: ${{ !inputs.skip_tests }}
    permissions:
      contents: read
      checks: write
      pull-requests: write

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt --quiet
          pip install pytest pytest-cov pytest-asyncio pytest-timeout httpx --quiet

      - name: Create test environment file
        run: |
          cat > .env << EOF
          AUTORCA_API_KEY=test-key-ci-${{ github.run_id }}
          ALLOWED_ORIGIN=http://localhost:3000
          GROQ_API_KEY=${{ secrets.GROQ_API_KEY_TEST }}
          LOG_LEVEL=WARNING
          EOF

      - name: Run test suite with coverage
        run: |
          pytest tests/ \
            --cov=. \
            --cov-report=xml \
            --cov-report=html \
            --cov-report=term-missing \
            --cov-fail-under=15 \
            --timeout=30 \
            --tb=short \
            -v \
            --junitxml=test-results.xml

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        if: matrix.python-version == '3.11'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          file: coverage.xml
          flags: unittests
          fail_ci_if_error: false

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-py${{ matrix.python-version }}
          path: |
            test-results.xml
            htmlcov/
            coverage.xml
          retention-days: 14

      - name: Publish test results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always() && matrix.python-version == '3.11'
        with:
          files: test-results.xml
          check_name: "Test Results"

  # ═══════════════════════════════════════════
  # JOB 3 — API Contract & Integration Tests
  # ═══════════════════════════════════════════
  api-test:
    name: API Contract Tests
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt httpx pytest pytest-timeout --quiet

      - name: Start API server
        run: |
          cat > .env << EOF
          AUTORCA_API_KEY=ci-contract-test-key
          ALLOWED_ORIGIN=http://localhost:3000
          EOF
          python api_server.py &
          echo "SERVER_PID=$!" >> $GITHUB_ENV
          # Wait for server to be ready
          for i in {1..15}; do
            curl -sf http://localhost:8000/api/health \
              -H "X-API-Key: ci-contract-test-key" && break || sleep 1
          done

      - name: Run API contract tests
        run: |
          pytest tests/test_api_contracts.py \
            --timeout=15 \
            -v \
            --tb=short

      - name: Test rate limiting behaviour
        run: |
          python - << 'PYEOF'
          import httpx, sys
          key = "ci-contract-test-key"
          url = "http://localhost:8000/api/health"
          # Send 15 rapid requests — rate limiter should kick in by ~10
          statuses = []
          with httpx.Client() as c:
              for _ in range(15):
                  r = c.get(url, headers={"X-API-Key": key})
                  statuses.append(r.status_code)
          print("Statuses:", statuses)
          if 429 not in statuses:
              print("WARNING: Rate limiter may not be active")
          else:
              print("✓ Rate limiting working correctly")
          PYEOF

      - name: Stop API server
        if: always()
        run: kill $SERVER_PID 2>/dev/null || true

  # ═══════════════════════════════════════════
  # JOB 4 — Build & Package
  # ═══════════════════════════════════════════
  build:
    name: Build & Package
    runs-on: ubuntu-latest
    needs: [test, api-test]
    outputs:
      version: ${{ steps.version.outputs.version }}
      image-tag: ${{ steps.meta.outputs.tags }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for version calculation

      - name: Calculate version
        id: version
        run: |
          # Semantic version from git tags + commit count
          LATEST_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
          COMMITS=$(git rev-list ${LATEST_TAG}..HEAD --count 2>/dev/null || echo "0")
          SHORT_SHA=$(git rev-parse --short HEAD)
          VERSION="${LATEST_TAG}.${COMMITS}+${SHORT_SHA}"
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "AutoRCA version: ${VERSION}"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Build Python package
        run: |
          pip install build --quiet
          python -m build
        continue-on-error: true  # Optional — not all setups have pyproject.toml

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            VERSION=${{ steps.version.outputs.version }}
            BUILD_DATE=${{ github.event.repository.updated_at }}
            VCS_REF=${{ github.sha }}

      - name: Run Trivy container vulnerability scan
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:sha-${{ github.sha }}
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
        continue-on-error: true

      - name: Upload Trivy scan to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: 'trivy-results.sarif'
        continue-on-error: true

  # ═══════════════════════════════════════════
  # JOB 5 — Deploy to Staging
  # ═══════════════════════════════════════════
  deploy-staging:
    name: Deploy → Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/develop' || github.event_name == 'workflow_dispatch'
    environment:
      name: staging
      url: https://autorca-staging.yourdomain.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Render (staging)
        run: |
          curl -s -X POST "${{ secrets.RENDER_STAGING_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
          | jq .

      - name: Wait for staging deployment
        run: |
          echo "Waiting for staging to come up..."
          for i in {1..24}; do
            STATUS=$(curl -sf https://autorca-staging.yourdomain.com/api/health \
              -H "X-API-Key: ${{ secrets.STAGING_API_KEY }}" \
              | jq -r '.status' 2>/dev/null || echo "down")
            echo "Attempt $i: $STATUS"
            if [ "$STATUS" = "ok" ]; then
              echo "✓ Staging is live"
              exit 0
            fi
            sleep 10
          done
          echo "✗ Staging failed to come up in time"
          exit 1

      - name: Run smoke tests against staging
        run: |
          pip install httpx --quiet
          python - << 'PYEOF'
          import httpx, sys
          base = "https://autorca-staging.yourdomain.com"
          key  = "${{ secrets.STAGING_API_KEY }}"
          
          checks = [
              ("GET",  "/api/health",  None),
              ("POST", "/api/analyze", {"log_content": "2024-01-01 ERROR test fail\n"}),
          ]
          
          failed = 0
          with httpx.Client(headers={"X-API-Key": key}, timeout=15) as c:
              for method, path, body in checks:
                  r = c.request(method, base+path, json=body)
                  ok = r.status_code < 400
                  print(f"{'✓' if ok else '✗'} {method} {path} → {r.status_code}")
                  if not ok: failed += 1
          
          sys.exit(failed)
          PYEOF

      - name: Notify Slack — staging deployed
        uses: slackapi/slack-github-action@v1.26.0
        if: always()
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '✅' || '❌' }} *AutoRCA Staging* — `${{ needs.build.outputs.version }}` deployed\n${{ github.event.head_commit.message }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK

  # ═══════════════════════════════════════════
  # JOB 6 — Deploy to Production
  # ═══════════════════════════════════════════
  deploy-production:
    name: Deploy → Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://autorca.yourdomain.com

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to production
        run: |
          curl -s -X POST "${{ secrets.RENDER_PROD_DEPLOY_HOOK }}" \
            -H "Content-Type: application/json" \
            -d '{"clearCache": false}' \
          | jq .

      - name: Health check — production
        run: |
          for i in {1..30}; do
            STATUS=$(curl -sf https://autorca.yourdomain.com/api/health \
              -H "X-API-Key: ${{ secrets.PROD_API_KEY }}" \
              | jq -r '.status' 2>/dev/null || echo "down")
            if [ "$STATUS" = "ok" ]; then
              echo "✓ Production is live"
              exit 0
            fi
            sleep 10
          done
          exit 1

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          tag_name: ${{ needs.build.outputs.version }}
          name: "AutoRCA ${{ needs.build.outputs.version }}"
          body_path: CHANGELOG.md
          draft: false
          prerelease: false

      - name: Notify Slack — production deployed
        uses: slackapi/slack-github-action@v1.26.0
        if: always()
        with:
          payload: |
            {
              "text": "${{ job.status == 'success' && '🚀' || '🔥' }} *AutoRCA Production* — `${{ needs.build.outputs.version }}` ${{ job.status }}\nCommit: ${{ github.event.head_commit.message }}\nAuthor: ${{ github.actor }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SLACK_WEBHOOK_TYPE: INCOMING_WEBHOOK