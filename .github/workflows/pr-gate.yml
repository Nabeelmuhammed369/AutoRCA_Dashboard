name: PR Quality Gate

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

jobs:

  # ─── Block draft PRs from full CI ───────────────────────────
  check-draft:
    name: PR Readiness
    runs-on: ubuntu-latest
    steps:
      - name: Check if draft
        if: github.event.pull_request.draft
        run: |
          echo "PR is a draft — skipping full CI"
          exit 0

  # ─── PR title must follow Conventional Commits ──────────────
  conventional-commits:
    name: Conventional Commit Title
    runs-on: ubuntu-latest
    steps:
      - uses: amannn/action-semantic-pull-request@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          types: |
            feat
            fix
            docs
            style
            refactor
            perf
            test
            chore
            ci
            revert

  # ─── Diff size guard ────────────────────────────────────────
  diff-size:
    name: PR Size Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check PR size
        run: |
          LINES=$(git diff origin/${{ github.base_ref }}...HEAD --stat | tail -1 | grep -oP '\d+ insertion' | grep -oP '\d+' || echo 0)
          echo "Lines added: $LINES"
          if [ "$LINES" -gt 1500 ]; then
            echo "⚠️  Large PR ($LINES lines). Consider splitting into smaller PRs."
          fi

  # ─── Auto-label by files changed ────────────────────────────
  auto-label:
    name: Auto Label
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/labeler@v5
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

  # ─── Quick test run (only changed files) ────────────────────
  quick-test:
    name: Quick Test (affected)
    runs-on: ubuntu-latest
    if: "!github.event.pull_request.draft"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
      - name: Install deps
        run: pip install -r requirements.txt pytest pytest-cov --quiet
      - name: Create .env
        run: |
          echo "AUTORCA_API_KEY=pr-test-key" > .env
          echo "ALLOWED_ORIGIN=http://localhost:3000" >> .env
      - name: Run tests
        run: pytest tests/ -x --tb=short -q