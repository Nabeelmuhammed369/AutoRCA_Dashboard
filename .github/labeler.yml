# .github/labeler.yml
# Auto-labels PRs based on files changed

backend:
  - changed-files:
    - any-glob-to-any-file: ['api_server.py', 'ai_analyzer.py', '*.py']

frontend:
  - changed-files:
    - any-glob-to-any-file: ['*.html', '*.css', '*.js']

tests:
  - changed-files:
    - any-glob-to-any-file: ['tests/**']

ci:
  - changed-files:
    - any-glob-to-any-file: ['.github/**']

docker:
  - changed-files:
    - any-glob-to-any-file: ['Dockerfile', 'docker-compose.yml']

dependencies:
  - changed-files:
    - any-glob-to-any-file: ['requirements.txt', 'pyproject.toml']

documentation:
  - changed-files:
    - any-glob-to-any-file: ['*.md', 'docs/**']