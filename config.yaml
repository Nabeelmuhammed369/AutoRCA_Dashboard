# AutoRCA config.yaml
# Place this file in the same directory as api_server.py

api:
  # Leave url empty to skip self-health check, or set to your production API URL.
  # Override at runtime with the API_URL environment variable.
  url: ""
  timeout: 5

# NOTE: Both "log" and "logs" are now supported by the fixed api_server.py
log:
  file: "app.log"          # Path to your log file (create a sample one if needed)

database:
  path: "autorca.db"       # Path to your SQLite DB (create empty file if needed)

# Optional: thresholds for anomaly detection
thresholds:
  error_rate: 10           # % error rate before flagging as degraded
  max_errors: 100          # max errors before critical alert